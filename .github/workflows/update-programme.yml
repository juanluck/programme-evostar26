name: Update and deploy friendly programme

on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild programme site
        run: >-
          python scrape_evostar_easychair.py
          --url https://easychair.org/smart-program/evostar2026/index.html
          --output-dir site
          --logo-file evo_logo.png
          --min-sessions 40
          --min-talks 100

      - name: Show parsed stats
        run: |
          python - <<'PY'
          import json
          with open('site/program.json', encoding='utf-8') as f:
              data = json.load(f)
          print('Days:', data['stats']['days'])
          print('Sessions:', data['stats']['sessions'])
          print('Talks:', data['stats']['talks'])
          print('Rooms:', data['stats']['rooms'])
          PY

      - name: Package GitHub Pages artifact
        run: |
          tar \
            --dereference \
            --hard-dereference \
            -cvf github-pages.tar \
            --directory site \
            .
          gzip -f github-pages.tar

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ./github-pages.tar.gz
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
